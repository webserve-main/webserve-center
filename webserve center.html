<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebServe</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #eef2f7;
            color: #1f2937;
        }

        header {
            text-align: center;
            padding: 70px 20px;
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #ffffff;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.85;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

            .card:hover {
                transform: translateY(-5px);
            }

        h2 {
            margin-bottom: 15px;
            color: #0f172a;
        }

        .services p {
            margin: 8px 0;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            color: #ffffff;
            background: #2563eb;
            transition: 0.3s;
        }

            .btn:hover {
                background: #1d4ed8;
            }

        .links a {
            display: inline-block;
            margin: 8px 12px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

            .links a:hover {
                text-decoration: underline;
            }

        footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="file:///C:/Users/Expert%20Gaming/Downloads/Webserve.png" alt="WebServe Logo" class="logo" />

        <h1>WebServe</h1>
        <p>Professional Web Development and Digital Solutions</p>

        <a class="btn" href="https://mail.google.com/mail/?view=cm&fs=1&to=webserve.com@gmail.com" target="_blank">Contact</a>
    </header>

    <div class="container">

        <div class="card services">
            <h2>Services</h2>
            <p>Website Design and Development</p>
            <p>E-commerce Store Creation</p>
            <p>Website Optimization and Improvement</p>
        </div>

        <div class="card">
            <h2>Social Media</h2>
            <div class="links">
                <a href="https://www.tiktok.com/@webserve.shop" target="_blank">TikTok</a>
                <a href="https://www.facebook.com/profile.php?id=61582181236440" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/webserve.main" target="_blank">Instagram</a>
            </div>
        </div>

    </div>
</body>
</html>
